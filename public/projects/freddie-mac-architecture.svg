<svg viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1a28"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.55"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#22d3ee" opacity="0.7"/>
    </marker>
  </defs>

  <rect width="860" height="400" fill="url(#bgGrad)"/>

  <!-- subtle grid -->
  <g opacity="0.06">
    <path d="M0 50 H860 M0 130 H860 M0 210 H860 M0 290 H860 M0 370 H860" stroke="#22d3ee" stroke-width="1"/>
    <path d="M100 0 V400 M260 0 V400 M420 0 V400 M580 0 V400 M740 0 V400" stroke="#22d3ee" stroke-width="1"/>
  </g>

  <!-- decorative glow -->
  <circle cx="120" cy="70" r="90" fill="#22d3ee" opacity="0.06"/>
  <circle cx="760" cy="340" r="110" fill="#22d3ee" opacity="0.05"/>

  <!-- eyebrow label -->
  <text x="40" y="42" fill="#22d3ee" font-family="Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="1.5">DATA PIPELINE ARCHITECTURE</text>

  <!-- Pipeline stage 1: Raw Data -->
  <g>
    <rect x="40" y="160" width="150" height="100" rx="14" fill="#111a28" stroke="#1c2734" stroke-width="1.5"/>
    <rect x="40" y="160" width="150" height="100" rx="14" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>
    <text x="115" y="198" text-anchor="middle" fill="#e7edf5" font-family="Inter, sans-serif" font-size="15" font-weight="700">Raw Loan Data</text>
    <text x="115" y="220" text-anchor="middle" fill="#8a97a8" font-family="Inter, sans-serif" font-size="12">150,000 loans</text>
    <text x="115" y="238" text-anchor="middle" fill="#8a97a8" font-family="Inter, sans-serif" font-size="12">6.2M monthly records</text>
  </g>

  <path d="M195 210 L245 210" stroke="url(#arrowGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Pipeline stage 2: Snowflake Staging -->
  <g>
    <rect x="250" y="160" width="150" height="100" rx="14" fill="#111a28" stroke="#1c2734" stroke-width="1.5"/>
    <rect x="250" y="160" width="150" height="100" rx="14" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>
    <text x="325" y="198" text-anchor="middle" fill="#e7edf5" font-family="Inter, sans-serif" font-size="15" font-weight="700">Snowflake</text>
    <text x="325" y="216" text-anchor="middle" fill="#e7edf5" font-family="Inter, sans-serif" font-size="15" font-weight="700">Staging</text>
    <text x="325" y="238" text-anchor="middle" fill="#8a97a8" font-family="Inter, sans-serif" font-size="12">Raw ELT ingestion</text>
  </g>

  <path d="M405 210 L455 210" stroke="url(#arrowGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Pipeline stage 3: dbt Intermediate -->
  <g>
    <rect x="460" y="160" width="150" height="100" rx="14" fill="#111a28" stroke="#1c2734" stroke-width="1.5"/>
    <rect x="460" y="160" width="150" height="100" rx="14" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>
    <text x="535" y="198" text-anchor="middle" fill="#e7edf5" font-family="Inter, sans-serif" font-size="15" font-weight="700">dbt</text>
    <text x="535" y="216" text-anchor="middle" fill="#e7edf5" font-family="Inter, sans-serif" font-size="15" font-weight="700">Intermediate</text>
    <text x="535" y="238" text-anchor="middle" fill="#8a97a8" font-family="Inter, sans-serif" font-size="12">Transform &amp; clean</text>
  </g>

  <path d="M615 210 L665 210" stroke="url(#arrowGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Pipeline stage 4: Star Schema Marts -->
  <g>
    <rect x="670" y="150" width="150" height="120" rx="14" fill="#0e2a3a" stroke="#22d3ee" stroke-width="1.5" opacity="0.95"/>
    <text x="745" y="188" text-anchor="middle" fill="#67e8f9" font-family="Inter, sans-serif" font-size="15" font-weight="700">Star Schema</text>
    <text x="745" y="206" text-anchor="middle" fill="#67e8f9" font-family="Inter, sans-serif" font-size="15" font-weight="700">Marts</text>
    <text x="745" y="228" text-anchor="middle" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="11">Fact + Dimension</text>
    <text x="745" y="245" text-anchor="middle" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="11">tables</text>
  </g>

  <!-- bottom badge: DQ tests -->
  <g>
    <rect x="40" y="310" width="270" height="50" rx="25" fill="#0f2430" stroke="#22d3ee" stroke-width="1" opacity="0.9"/>
    <circle cx="68" cy="335" r="6" fill="#22d3ee"/>
    <text x="86" y="340" fill="#e7edf5" font-family="Inter, sans-serif" font-size="14" font-weight="600">11 automated data quality tests</text>
  </g>

  <g>
    <rect x="330" y="310" width="230" height="50" rx="25" fill="#0f2430" stroke="#22d3ee" stroke-width="1" opacity="0.9"/>
    <circle cx="358" cy="335" r="6" fill="#22d3ee"/>
    <text x="376" y="340" fill="#e7edf5" font-family="Inter, sans-serif" font-size="14" font-weight="600">Key + referential integrity</text>
  </g>
</svg>
