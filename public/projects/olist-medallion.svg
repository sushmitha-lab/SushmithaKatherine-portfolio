<svg viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="medBg" cx="30%" cy="25%" r="90%">
      <stop offset="0%" stop-color="#2e1c2a"/>
      <stop offset="100%" stop-color="#100810"/>
    </radialGradient>
    <filter id="medGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <marker id="medArrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#22d3ee" opacity="0.8"/>
    </marker>
  </defs>

  <rect width="860" height="400" fill="url(#medBg)"/>
  <circle cx="120" cy="90" r="120" fill="#22d3ee" opacity="0.08" filter="url(#medGlow)"/>
  <circle cx="760" cy="330" r="140" fill="#f5c26b" opacity="0.06" filter="url(#medGlow)"/>

  <text x="40" y="42" fill="#67e8f9" font-family="Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="1.5">MEDALLION ARCHITECTURE</text>

  <!-- Ingest -->
  <g>
    <rect x="40" y="150" width="120" height="100" rx="14" fill="#111a28" stroke="#1c2734" stroke-width="1.5"/>
    <circle cx="100" cy="188" r="14" fill="none" stroke="#67e8f9" stroke-width="2"/>
    <path d="M100 182 L100 194 M94 188 L106 188" stroke="#67e8f9" stroke-width="2"/>
    <text x="100" y="222" text-anchor="middle" fill="#e7edf5" font-family="Inter, sans-serif" font-size="13" font-weight="700">Ingest</text>
    <text x="100" y="238" text-anchor="middle" fill="#8a97a8" font-family="Inter, sans-serif" font-size="10">100K+ orders</text>
  </g>

  <path d="M165 200 L205 200" stroke="#22d3ee" stroke-width="2" opacity="0.5" marker-end="url(#medArrow)"/>

  <!-- Bronze -->
  <g>
    <circle cx="270" cy="200" r="58" fill="#2a1f14" stroke="#cd7f32" stroke-width="2" opacity="0.95"/>
    <circle cx="270" cy="200" r="58" fill="#cd7f32" opacity="0.12" filter="url(#medGlow)"/>
    <text x="270" y="196" text-anchor="middle" fill="#e0a868" font-family="Inter, sans-serif" font-size="15" font-weight="700">Bronze</text>
    <text x="270" y="214" text-anchor="middle" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="10">Raw Delta</text>
  </g>

  <path d="M330 200 L375 200" stroke="#22d3ee" stroke-width="2" opacity="0.5" marker-end="url(#medArrow)"/>

  <!-- Silver -->
  <g>
    <circle cx="440" cy="200" r="58" fill="#1c1f24" stroke="#c0c0c0" stroke-width="2" opacity="0.95"/>
    <circle cx="440" cy="200" r="58" fill="#c0c0c0" opacity="0.1" filter="url(#medGlow)"/>
    <text x="440" y="196" text-anchor="middle" fill="#d6d9dd" font-family="Inter, sans-serif" font-size="15" font-weight="700">Silver</text>
    <text x="440" y="214" text-anchor="middle" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="10">Validated</text>
  </g>

  <path d="M500 200 L545 200" stroke="#22d3ee" stroke-width="2" opacity="0.5" marker-end="url(#medArrow)"/>

  <!-- Gold -->
  <g>
    <circle cx="610" cy="200" r="58" fill="#2a2413" stroke="#d4af37" stroke-width="2" opacity="0.95"/>
    <circle cx="610" cy="200" r="60" fill="#d4af37" opacity="0.18" filter="url(#medGlow)"/>
    <text x="610" y="196" text-anchor="middle" fill="#f5d76e" font-family="Inter, sans-serif" font-size="15" font-weight="700">Gold</text>
    <text x="610" y="214" text-anchor="middle" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="10">9 tables</text>
  </g>

  <path d="M670 200 L715 200" stroke="#22d3ee" stroke-width="2" opacity="0.5" marker-end="url(#medArrow)"/>

  <!-- Output -->
  <g>
    <rect x="720" y="150" width="100" height="100" rx="14" fill="#0e2a3a" stroke="#22d3ee" stroke-width="1.5" opacity="0.95"/>
    <text x="770" y="192" text-anchor="middle" fill="#67e8f9" font-family="Inter, sans-serif" font-size="12" font-weight="700">Analytics</text>
    <text x="770" y="208" text-anchor="middle" fill="#67e8f9" font-family="Inter, sans-serif" font-size="12" font-weight="700">ready</text>
  </g>

  <!-- schema check badges -->
  <g>
    <rect x="40" y="310" width="230" height="46" rx="23" fill="#0f2430" stroke="#22d3ee" stroke-width="1" opacity="0.9"/>
    <circle cx="66" cy="333" r="5" fill="#22d3ee"/>
    <text x="82" y="338" fill="#e7edf5" font-family="Inter, sans-serif" font-size="13" font-weight="600">Schema checks per layer</text>
  </g>
  <g>
    <rect x="290" y="310" width="210" height="46" rx="23" fill="#0f2430" stroke="#22d3ee" stroke-width="1" opacity="0.9"/>
    <circle cx="316" cy="333" r="5" fill="#22d3ee"/>
    <text x="332" y="338" fill="#e7edf5" font-family="Inter, sans-serif" font-size="13" font-weight="600">PySpark + MLflow</text>
  </g>
</svg>
