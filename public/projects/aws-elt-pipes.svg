<svg viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pipeBg" cx="30%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#0c2e2c"/>
      <stop offset="100%" stop-color="#04100f"/>
    </radialGradient>
    <linearGradient id="pipeMetal1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e2a3a"/>
      <stop offset="15%" stop-color="#3fd8f0"/>
      <stop offset="35%" stop-color="#0e2a3a"/>
      <stop offset="65%" stop-color="#0e2a3a"/>
      <stop offset="85%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e2a3a"/>
    </linearGradient>
    <linearGradient id="pipeMetal2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2413"/>
      <stop offset="15%" stop-color="#f5d98a"/>
      <stop offset="35%" stop-color="#2a2413"/>
      <stop offset="65%" stop-color="#2a2413"/>
      <stop offset="85%" stop-color="#f5c26b"/>
      <stop offset="100%" stop-color="#2a2413"/>
    </linearGradient>
    <filter id="pipeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="860" height="400" fill="url(#pipeBg)"/>

  <circle cx="700" cy="90" r="140" fill="#22d3ee" opacity="0.08" filter="url(#pipeGlow)"/>
  <circle cx="120" cy="330" r="130" fill="#f5c26b" opacity="0.06" filter="url(#pipeGlow)"/>

  <g opacity="0.12" stroke="#22d3ee" stroke-width="0.5">
    <path d="M60 60 H800 M60 340 H800"/>
    <path d="M60 60 V340 M800 60 V340"/>
  </g>

  <!-- Main horizontal pipe -->
  <rect x="60" y="150" width="740" height="34" rx="17" fill="url(#pipeMetal1)"/>
  <!-- Vertical junction pipe down to secondary pipe -->
  <rect x="330" y="184" width="34" height="90" rx="17" fill="url(#pipeMetal1)"/>
  <!-- Secondary horizontal pipe (gold) -->
  <rect x="330" y="256" width="470" height="30" rx="15" fill="url(#pipeMetal2)"/>

  <!-- Flange rings along main pipe -->
  <g stroke="#0a141f" stroke-width="3" fill="none" opacity="0.8">
    <ellipse cx="180" cy="167" rx="6" ry="19"/>
    <ellipse cx="420" cy="167" rx="6" ry="19"/>
    <ellipse cx="620" cy="167" rx="6" ry="19"/>
  </g>
  <g stroke="#0a141f" stroke-width="3" fill="none" opacity="0.8">
    <ellipse cx="470" cy="271" rx="6" ry="17"/>
    <ellipse cx="640" cy="271" rx="6" ry="17"/>
  </g>

  <!-- End caps -->
  <circle cx="60" cy="167" r="19" fill="#0e2a3a" stroke="#22d3ee" stroke-width="2" opacity="0.7"/>
  <circle cx="800" cy="167" r="19" fill="#0e2a3a" stroke="#22d3ee" stroke-width="2" opacity="0.9"/>
  <circle cx="800" cy="271" r="17" fill="#2a2413" stroke="#f5c26b" stroke-width="2" opacity="0.9"/>

  <!-- flowing particles inside main pipe -->
  <g fill="#67e8f9" opacity="0.9">
    <circle cx="140" cy="167" r="3"/>
    <circle cx="260" cy="167" r="3"/>
    <circle cx="500" cy="167" r="3"/>
    <circle cx="700" cy="167" r="3"/>
  </g>
  <g fill="#f5d98a" opacity="0.9">
    <circle cx="410" cy="271" r="3"/>
    <circle cx="580" cy="271" r="3"/>
    <circle cx="720" cy="271" r="3"/>
  </g>

  <text x="40" y="42" fill="#67e8f9" font-family="Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="1.5">SERVERLESS PIPELINE</text>
</svg>
