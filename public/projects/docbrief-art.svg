<svg viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="dbBg" cx="30%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#123326"/>
      <stop offset="100%" stop-color="#050e0a"/>
    </radialGradient>
    <filter id="dbGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <marker id="dbArrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#34d399" opacity="0.8"/>
    </marker>
  </defs>

  <rect width="860" height="400" fill="url(#dbBg)"/>
  <circle cx="700" cy="110" r="140" fill="#34d399" opacity="0.09" filter="url(#dbGlow)"/>
  <circle cx="140" cy="320" r="130" fill="#22d3ee" opacity="0.07" filter="url(#dbGlow)"/>

  <text x="40" y="42" fill="#6ee7b7" font-family="Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="1.5">CLINICAL EVIDENCE RAG</text>

  <!-- Patient input card -->
  <g>
    <rect x="40" y="150" width="150" height="100" rx="14" fill="#0f1f18" stroke="#1c352a" stroke-width="1.5"/>
    <circle cx="75" cy="182" r="10" fill="none" stroke="#6ee7b7" stroke-width="2"/>
    <path d="M60 208 Q75 194 90 208" stroke="#6ee7b7" stroke-width="2" fill="none"/>
    <text x="115" y="187" text-anchor="middle" fill="#e7edf5" font-family="Inter, sans-serif" font-size="13" font-weight="700">Patient</text>
    <text x="115" y="203" text-anchor="middle" fill="#e7edf5" font-family="Inter, sans-serif" font-size="13" font-weight="700">presentation</text>
    <text x="115" y="228" text-anchor="middle" fill="#8a97a8" font-family="Inter, sans-serif" font-size="10">Symptoms · labs · history</text>
  </g>

  <path d="M195 200 L245 200" stroke="#34d399" stroke-width="2" opacity="0.6" marker-end="url(#dbArrow)"/>

  <!-- Vector search node -->
  <g>
    <circle cx="320" cy="200" r="58" fill="#0e2a22" stroke="#34d399" stroke-width="1.5" opacity="0.95"/>
    <circle cx="300" cy="185" r="4" fill="#6ee7b7"/>
    <circle cx="335" cy="180" r="3" fill="#6ee7b7"/>
    <circle cx="340" cy="210" r="4" fill="#67e8f9"/>
    <circle cx="305" cy="215" r="3" fill="#6ee7b7"/>
    <circle cx="320" cy="198" r="5" fill="#34d399"/>
    <line x1="320" y1="198" x2="300" y2="185" stroke="#34d399" stroke-width="1" opacity="0.5"/>
    <line x1="320" y1="198" x2="335" y2="180" stroke="#34d399" stroke-width="1" opacity="0.5"/>
    <line x1="320" y1="198" x2="340" y2="210" stroke="#34d399" stroke-width="1" opacity="0.5"/>
    <line x1="320" y1="198" x2="305" y2="215" stroke="#34d399" stroke-width="1" opacity="0.5"/>
    <text x="320" y="240" text-anchor="middle" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="10">ChromaDB · top-5</text>
  </g>

  <path d="M380 200 L430 200" stroke="#34d399" stroke-width="2" opacity="0.6" marker-end="url(#dbArrow)"/>

  <!-- LLM synthesis -->
  <g>
    <rect x="435" y="150" width="160" height="100" rx="14" fill="#0f1f18" stroke="#1c352a" stroke-width="1.5"/>
    <text x="515" y="190" text-anchor="middle" fill="#e7edf5" font-family="Inter, sans-serif" font-size="13" font-weight="700">Llama 3.3 70B</text>
    <text x="515" y="207" text-anchor="middle" fill="#8a97a8" font-family="Inter, sans-serif" font-size="10">via Groq</text>
    <text x="515" y="228" text-anchor="middle" fill="#8a97a8" font-family="Inter, sans-serif" font-size="10">Synthesizes evidence</text>
  </g>

  <path d="M600 200 L650 200" stroke="#34d399" stroke-width="2" opacity="0.6" marker-end="url(#dbArrow)"/>

  <!-- Output -->
  <g>
    <rect x="655" y="150" width="165" height="100" rx="14" fill="#0e2a22" stroke="#34d399" stroke-width="1.5" opacity="0.95"/>
    <text x="737" y="185" text-anchor="middle" fill="#6ee7b7" font-family="Inter, sans-serif" font-size="13" font-weight="700">Evidence-backed</text>
    <text x="737" y="202" text-anchor="middle" fill="#6ee7b7" font-family="Inter, sans-serif" font-size="13" font-weight="700">assessment</text>
    <text x="737" y="222" text-anchor="middle" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="10">With inline citations</text>
  </g>

  <!-- bottom badges -->
  <g>
    <rect x="40" y="310" width="260" height="46" rx="23" fill="#0f2420" stroke="#34d399" stroke-width="1" opacity="0.9"/>
    <circle cx="66" cy="333" r="5" fill="#34d399"/>
    <text x="82" y="338" fill="#e7edf5" font-family="Inter, sans-serif" font-size="13" font-weight="600">18 clinical guidelines · 8 domains</text>
  </g>
  <g>
    <rect x="320" y="310" width="230" height="46" rx="23" fill="#0f2420" stroke="#34d399" stroke-width="1" opacity="0.9"/>
    <circle cx="346" cy="333" r="5" fill="#34d399"/>
    <text x="362" y="338" fill="#e7edf5" font-family="Inter, sans-serif" font-size="13" font-weight="600">React + FastAPI + RAG</text>
  </g>
</svg>
